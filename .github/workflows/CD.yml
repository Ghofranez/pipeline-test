name: CD - Deploy Docker App Local

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      # 1. Récupérer le code source proprement dans le dossier du Runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Exécuter le déploiement directement sur la VM
      - name: Execute Deployment Script
        run: |
          echo "=== DEBUT DU DEPLOIEMENT SUR LA VM ==="

          # On se place dans le dossier où le runner a téléchargé le code
          cd $GITHUB_WORKSPACE
          echo "Répertoire de travail : $(pwd)"

          # ── Sauvegarder les données (Backup) ──
          # On crée un dossier backup dans le home de l'utilisateur actuel
          BACKUP_DIR="$HOME/backups/$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$BACKUP_DIR"
          cp -r ./data "$BACKUP_DIR" 2>/dev/null || true
          echo "Backup créé dans : $BACKUP_DIR"

          # ── Gestion Docker ──
          echo "Arrêt des anciens containers..."
          docker-compose down

          echo "Reconstruction et lancement des services..."
          # Build et lance en arrière-plan
          docker-compose up --build -d

          # ── Health Check (Vérification) ──
          echo "Attente du démarrage (15s)..."
          sleep 15

          if curl -f -s http://localhost:80; then
            echo "✅ Application démarrée avec succès sur le port 80 !"
          else
            echo "❌ Échec du test de santé ! Tentative de Rollback..."
            docker-compose down
            # Retour à la version précédente si possible
            git checkout HEAD~1
            docker-compose up --build -d
            echo "⚠️ Rollback effectué."
            exit 1
          fi

          echo "=== DEPLOIEMENT TERMINE AVEC SUCCES ==="

      - name: Notify Success
        if: success()
        run: echo "Le déploiement est terminé et l'application répond."

      - name: Notify Failure
        if: failure()
        run: echo "Le déploiement a échoué. Vérifiez les logs avec 'docker-compose logs'."