name: CD - Deploy Docker App Local

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted          # Utilise votre VM directement

    steps:
      # 1. Récupérer le code source sur la VM
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Exécution du déploiement (Directement dans le shell de la VM)
      - name: Execute Deployment Script
        run: |
          echo "=== DEBUT DU DEPLOIEMENT SUR LA VM ==="

          # Accéder au dossier du projet (créé par vous au préalable)
          # Note : Le runner télécharge aussi le code dans son dossier '_work', 
          # mais ici on synchronise avec votre dossier de production.
          cd /home/asus/devsecops-react || exit 1

          # Mettre à jour le code local
          git pull origin main

          # ── Sauvegarder les données ──
          BACKUP_DIR="/home/asus/backups/$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$BACKUP_DIR"
          cp -r /home/asus/devsecops-react/data "$BACKUP_DIR" 2>/dev/null || true
          echo "Backup créé dans : $BACKUP_DIR"

          # ── Gestion Docker ──
          echo "Arrêt des anciens containers..."
          docker-compose down

          echo "Reconstruction et lancement..."
          docker-compose up --build -d

          # ── Health Check ──
          echo "Attente du démarrage (15s)..."
          sleep 15

          if curl -f -s http://localhost:80; then
            echo "✅ Application démarrée avec succès sur le port 80 !"
          else
            echo "❌ Échec du test de santé ! Rollback en cours..."
            docker-compose down
            git checkout HEAD~1
            docker-compose up --build -d
            echo "⚠️ Rollback effectué."
            exit 1
          fi

          echo "=== DEPLOIEMENT TERMINE AVEC SUCCES ==="

      # 3. Notifications simples
      - name: Notify Success
        if: success()
        run: echo "✅ Le pipeline a fini son travail avec succès."

      - name: Notify Failure
        if: failure()
        run: echo "❌ Le pipeline a échoué. Vérifiez les logs Docker sur la VM."