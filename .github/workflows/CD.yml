name: CD - Deploy Docker App Local

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: SSH Deploy to Localhost
      uses: appleboy/ssh-action@v0.1.9
      with:
        host: localhost
        username: asus
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /home/asus/devsecops-react  # Remplace par le chemin réel sur ton serveur

          # Arrêter et supprimer tous les containers existants
          docker-compose down

          # Build et lancer tous les services définis dans docker-compose.yml
          docker-compose up --build -d