name: CD - Deploy Docker App

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Deployment Script
        run: |
          echo "=== DÉBUT DU DÉPLOIEMENT ==="
          cd $GITHUB_WORKSPACE

          # 1. Sauvegarde version actuelle pour rollback
          docker compose ps > /tmp/previous_state.txt

          # 2. Arrêt propre
          docker compose down

          # 3. Rebuild et relance
          docker compose up -d --build

          echo "=== DÉPLOIEMENT TERMINÉ ==="

      - name: Health check après deploy
        run: |
          echo "Vérification que l'app tourne..."
          until curl -sf http://localhost:8000/; do
            echo "Waiting for backend..."
            sleep 3
          done
          echo "✅ Backend opérationnel !"
          until curl -sf http://localhost:8080/; do
            echo "Waiting for frontend..."
            sleep 3
          done
          echo "✅ Frontend opérationnel !"

      - name: Verify containers
        run: docker ps

      - name: Rollback si échec
        if: failure()
        run: |
          echo "❌ Déploiement échoué - Rollback en cours..."
          docker compose down
          docker compose up -d
          echo "⚠️ Rollback terminé - ancienne version restaurée"

      - name: Notify Success
        if: success()
        run: echo "✅ Déploiement réussi sur la VM Ubuntu !"

      - name: Notify Failure
        if: failure()
        run: echo "❌ Déploiement échoué !"