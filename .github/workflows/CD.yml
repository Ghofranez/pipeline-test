name: CD - Deploy Docker App Local

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Deployment Script
        run: |
          echo "=== DÉBUT DU DÉPLOIEMENT ==="
          cd $GITHUB_WORKSPACE

          # 1. On arrête tout proprement
          docker-compose down

          # 2. On reconstruit et on relance (Le --build est crucial ici)
          # Cela va lire ton Dockerfile (sans le npm audit fix) et ton package.json (5.0.1)
          docker-compose up -d --build

          # 3. Petit temps d'attente pour laisser React respirer
          echo "Attente du démarrage des services..."
          sleep 20

          # 4. Vérification rapide des containers
          docker ps
          
          echo "=== DÉPLOIEMENT TERMINÉ ==="
          echo "Vérifiez sur Windows : http://localhost:8080"

      - name: Notify Success
        if: success()
        run: echo "Le pipeline a terminé le déploiement avec succès."