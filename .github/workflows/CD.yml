name: CD - Deploy Docker App
permissions:
  contents: read
on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:

      ############################################
      # 1. CHECKOUT DU CODE
      ############################################
      - name: Checkout code
        uses: actions/checkout@v4                          # ← FIXED: v4.2.2 n'existe pas

      ############################################
      # 2. VERIFICATION SIGNATURE — COSIGN
      ############################################
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0             # ← FIXED: tag exact requis

      - name: Set image names
        id: images                                         # ← ADDED: id pour outputs statiques
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER}/my-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend=ghcr.io/${OWNER}/my-frontend:latest" >> $GITHUB_OUTPUT
          # ↑ FIXED: GITHUB_OUTPUT + outputs nommés → résolvables statiquement par le linter

      - name: Verify Backend Image (Cosign)
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          echo "$COSIGN_PUBLIC_KEY" > cosign.pub
          cosign verify --key cosign.pub ${{ steps.images.outputs.backend }}   # ← FIXED
          if [ $? -ne 0 ]; then
            echo "Image backend non signée — déploiement stoppé !"
            exit 1
          fi
          echo "Image backend vérifiée"

      - name: Verify Frontend Image (Cosign)
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          cosign verify --key cosign.pub ${{ steps.images.outputs.frontend }}  # ← FIXED
          if [ $? -ne 0 ]; then
            echo "Image frontend non signée — déploiement stoppé !"
            exit 1
          fi
          echo "Image frontend vérifiée"

      ############################################
      # 3. DEPLOIEMENT
      ############################################
      - name: Execute Deployment Script
        run: |
          echo "=== DÉBUT DU DÉPLOIEMENT ==="
          cd $GITHUB_WORKSPACE
          docker-compose down
          docker-compose up -d --build
          echo "Attente du démarrage des services..."
          sleep 20
          docker ps
          echo "=== DÉPLOIEMENT TERMINÉ ==="

      ############################################
      # 4. HEALTH CHECK
      ############################################
      - name: Health Check après deploy
        run: |
          until curl -sf http://localhost:8000/; do
            echo "Waiting for backend..."
            sleep 3
          done
          echo "Backend opérationnel !"

      ############################################
      # 5. OWASP ZAP — DAST
      ############################################
      - name: Create ZAP report directory
        run: |
          mkdir -p ${{ github.workspace }}/zap-report
          chmod 777 ${{ github.workspace }}/zap-report

      - name: OWASP ZAP Scan (DAST)
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/zap-report:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8000 \
            -r zap-report.html \
            -J zap-report.json \
            -l WARN \
            -I

      - name: Vérification résultats ZAP
        run: |
          if [ -f "${{ github.workspace }}/zap-report/zap-report.json" ]; then
            CRITICAL=$(cat ${{ github.workspace }}/zap-report/zap-report.json | grep -c '"riskcode":"3"' || true)
            if [ "$CRITICAL" -gt "0" ]; then
              echo "ZAP détecte $CRITICAL failles CRITICAL — déploiement stoppé !"
              exit 1
            fi
            echo "Aucune faille critique détectée par ZAP"
          else
            echo "Rapport ZAP non trouvé — scan ignoré"
          fi

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: ${{ github.workspace }}/zap-report/zap-report.html

      ############################################
      # 6. VERIFICATION FALCO
      ############################################
      - name: Vérification Falco
        run: |
          ALERTS=$(sudo journalctl -u falco --since "2 minutes ago" | grep -i "critical" || true)
          if [ -n "$ALERTS" ]; then
            echo "Falco détecte une menace critique !"
            echo "$ALERTS"
            exit 1
          fi
          echo "Aucune alerte Falco critique"

      ############################################
      # 7. VERIFY CONTAINERS
      ############################################
      - name: Verify containers
        run: docker ps

      ############################################
      # 8. ROLLBACK SI ECHEC
      ############################################
      - name: Rollback si échec
        if: failure()
        run: |
          echo "Rollback en cours..."
          docker-compose down
          docker-compose up -d
          echo "Rollback terminé"

      ############################################
      # 9. NOTIFICATIONS
      ############################################
      - name: Notify Success
        if: success()
        run: echo "Déploiement réussi !"

      - name: Notify Failure
        if: failure()
        run: echo "Déploiement échoué !"