name: CD - Deploy App
permissions:
  contents: read
  packages: read
  actions: read

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

jobs:

  ########################################################
  # JOB 1 — VERIFICATION SIGNATURE COSIGN
  ########################################################
  cosign-verify:
    name: Verify Image Signatures (Cosign)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    outputs:
      backend_image: ${{ steps.images.outputs.backend }}
      frontend_image: ${{ steps.images.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image names
        id: images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER}/my-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend=ghcr.io/${OWNER}/my-frontend:latest" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Cosign Public Key
        run: echo "${{ secrets.COSIGN_PUBLIC_KEY }}" > cosign.pub

      - name: Verify Backend Image
        run: |
          cosign verify --key cosign.pub ${{ steps.images.outputs.backend }}
          echo "Backend image verified ✔"

      - name: Verify Frontend Image
        run: |
          cosign verify --key cosign.pub ${{ steps.images.outputs.frontend }}
          echo "Frontend image verified ✔"

  ########################################################
  # JOB 2 — DEPLOIEMENT (PULL + COMPOSE)
  ########################################################
  deploy:
    name: Deploy Application
    needs: cosign-verify
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Signed Images
        run: |
          docker pull "${{ needs.cosign-verify.outputs.backend_image }}"
          docker pull "${{ needs.cosign-verify.outputs.frontend_image }}"

      - name: Update Compose File
        run: |
          sed -i "s|image: my-backend.*|image: ${{ needs.cosign-verify.outputs.backend_image }}|" docker-compose.yml
          sed -i "s|image: my-frontend.*|image: ${{ needs.cosign-verify.outputs.frontend_image }}|" docker-compose.yml

      - name: Deploy with Docker Compose
        run: |
          docker-compose down
          docker-compose up -d
          sleep 20
          docker ps

  ########################################################
  # JOB 3 — HEALTH CHECK
  ########################################################
  health-check:
    name: Health Check
    needs: deploy
    runs-on: self-hosted

    steps:
      - name: Backend Check
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:8000/ && exit 0
            sleep 5
          done
          exit 1

      - name: Frontend Check
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:3000/ && exit 0
            sleep 5
          done
          exit 1

  ########################################################
  # JOB 4 — OWASP ZAP DAST
  ########################################################
  dast-zap:
    name: DAST Scan (OWASP ZAP)
    needs: health-check
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Prepare ZAP Directory
        run: mkdir -p zap-report

      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/zap-report:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8000 \
            -r zap-report.html \
            -J zap-report.json \
            -I -l WARN

      - name: Analyse ZAP Results
        run: |
          CRITICAL=$(grep -c '"riskcode":"3"' zap-report/zap-report.json || true)
          if [ "$CRITICAL" -gt "0" ]; then
            echo "Critical ZAP findings: $CRITICAL"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report/zap-report.html

  ########################################################
  # JOB 5 — FALCO SECURITY CHECK
  ########################################################
  falco-check:
    name: Falco Runtime Security Check
    needs: dast-zap
    runs-on: self-hosted

    steps:
      - name: Check Falco Alerts (5min)
        run: |
          ALERTS=$(sudo journalctl -u falco --since "5 minutes ago" | grep -i "critical" || true)
          [ -n "$ALERTS" ] && echo "$ALERTS" && exit 1
          echo "No critical Falco alerts ✔"

  ########################################################
  # JOB 6 — VERIFY CONTAINERS
  ########################################################
  verify-containers:
    name: Verify Running Containers
    needs: falco-check
    runs-on: self-hosted

    steps:
      - name: Container List
        run: docker ps

      - name: Check Container Count
        run: |
          COUNT=$(docker ps --filter "status=running" | wc -l)
          [ "$COUNT" -lt 2 ] && exit 1

  ########################################################
  # JOB 7 — ROLLBACK
  ########################################################
  rollback:
    name: Rollback on Failure
    if: failure()
    needs: [deploy, health-check, dast-zap, falco-check, verify-containers]
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Rollback
        run: |
          docker-compose down
          docker-compose up -d
          sleep 10
          docker ps

  ########################################################
  # JOB 8 — NOTIFICATIONS
  ########################################################
  notify:
    name: Notifications
    needs: [verify-containers, rollback]
    runs-on: self-hosted
    if: always()

    steps:
      - name: Success
        if: ${{ needs.verify-containers.result == 'success' }}
        run: |
          echo "✔ Deployment Success"
          echo "Backend  : ${{ needs.cosign-verify.outputs.backend_image }}"
          echo "Frontend : ${{ needs.cosign-verify.outputs.frontend_image }}"

      - name: Failure
        if: ${{ needs.verify-containers.result != 'success' }}
        run: echo "✘ Deployment Failed"