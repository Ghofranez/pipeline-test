name: CD - Deploy App
permissions:
  contents: read
  packages: read
  actions: read

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:

  ########################################################
  # JOB 1 — VERIFICATION SIGNATURE COSIGN
  ########################################################
  cosign-verify:
    name: Verify Image Signatures (Cosign)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    outputs:
      backend_image: ${{ steps.images.outputs.backend }}
      frontend_image: ${{ steps.images.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "backend=ghcr.io/${OWNER}/my-backend:latest" >> $GITHUB_OUTPUT
          echo "frontend=ghcr.io/${OWNER}/my-frontend:latest" >> $GITHUB_OUTPUT

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Cosign Key
        run: echo "${{ secrets.COSIGN_PUBLIC_KEY }}" > cosign.pub

      - name: Verify Backend Image
        run: |
          cosign verify --key cosign.pub \
            --insecure-ignore-tlog \
            ${{ steps.images.outputs.backend }}

      - name: Verify Frontend Image
        run: |
          cosign verify --key cosign.pub \
            --insecure-ignore-tlog \
            ${{ steps.images.outputs.frontend }}

  ########################################################
  # JOB 2 — DEPLOIEMENT (IMAGES SIGNÉES, PAS DE BUILD)
  ########################################################
  deploy:
    name: Deploy Application
    needs: cosign-verify
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Signed Images
        run: |
          docker pull "${{ needs.cosign-verify.outputs.backend_image }}"
          docker pull "${{ needs.cosign-verify.outputs.frontend_image }}"
          docker images

      - name: Update Compose File Tags
        run: |
          sed -i "s|image: my-backend.*|image: ${{ needs.cosign-verify.outputs.backend_image }}|" docker-compose.yml
          sed -i "s|image: my-frontend.*|image: ${{ needs.cosign-verify.outputs.frontend_image }}|" docker-compose.yml

      - name: Deploy with Docker Compose
        run: |
          docker compose down
          docker compose up -d
          sleep 20
          docker ps

  ########################################################
  # JOB 3 — HEALTH CHECK
  ########################################################
  health-check:
    name: Health Check
    needs: deploy
    runs-on: self-hosted
    steps:
      - name: Health Check Backend
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:8000/; then exit 0; fi
            sleep 5
          done
          exit 1

      - name: Health Check Frontend
        run: |
          for i in {1..10}; do
            if curl -sf http://localhost:3000/; then exit 0; fi
            sleep 5
          done
          exit 1