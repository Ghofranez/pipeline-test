name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Wait for backend
        run: |
          until curl -s http://localhost:8000/; do
            echo "Waiting for backend..."
            sleep 2
          done

      - name: Test backend health
        run: curl -f http://localhost:8000/

  lint:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend linting (Python)
      - name: Install flake8
        run: pip install flake8

      - name: Lint backend
        run: flake8 backend/ --max-line-length=120

      # Frontend linting (React)
      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Lint frontend
        run: cd frontend && npm run lint

  unit-tests:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d

      # Backend tests (FastAPI + pytest)
      - name: Run backend unit tests
        run: docker compose exec -T backend pytest tests/ -v

      # Frontend tests (React)
      - name: Run frontend tests
        run: docker compose exec -T frontend npm test -- --watchAll=false

  security-scan:
    needs: [build, lint, unit-tests]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images pour scan
        run: docker compose build

      - name: Trivy scan - Code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy scan - Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: my-backend:latest
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy scan - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: my-frontend:latest
          severity: CRITICAL
          exit-code: 1

      - name: Notify CI Failure
        if: failure()
        run: echo "❌ CI échouée - Deploy bloqué !"