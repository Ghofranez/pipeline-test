name: CI Full External Security
permissions:
  contents: read
  security-events: write   # nécessaire pour upload SARIF
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  ############################################################
  # JOB 1 — BUILD ET SCANS INITIAUX (Secrets, IaC, Policy)
  ############################################################
  build:
    runs-on: ubuntu-24.04
    steps:

      ############################################
      # 1. CHECKOUT DU CODE
      ############################################
      - name: Checkout
        uses: actions/checkout@v4

      ############################################
      # 2. SECRET SCANNING — GITLEAKS
      # Vérifie si des secrets sont exposés dans le code source
      ############################################
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: false
      ############################################
      # 3. IaC SECURITY — CHECKOV
      # Analyse Terraform / Kubernetes / Docker pour configurations risquées
      ############################################
      - name: IaC Scan (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: "."
          soft_fail: false
          config_file: ".checkov.yaml"

      ############################################
      # 4. POLICY AS CODE — CONFTEST
      # Valide des règles personnalisées (Dockerfile, Terraform, K8s)
      ############################################
      - name: Policy Validation (Conftest)
        uses: instrumenta/conftest-action@v0.4.0
        with:
          files: |
            terraform/
            kubernetes/
            docker/
          policy: policy/

      ############################################
      # 5. SONARQUBE — SAST / CODE QUALITY
      # Analyse statique de code, qualité, bugs, code smells
      ############################################
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      ############################################
      # 6. DOCKER BUILD — Construction des images
      ############################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      ############################################
      # 7. SBOM (CycloneDX) — Génération SBOM pour backend et frontend
      ############################################
      - name: SBOM Backend
        uses: anchore/sbom-action@v0.24.0
        with:
          image: my-backend:latest
          format: cyclonedx-json
          output-file: sbom-backend.json

      - name: SBOM Frontend
        uses: anchore/sbom-action@v0.24.0
        with:
          image: my-frontend:latest
          format: cyclonedx-json
          output-file: sbom-frontend.json

      ############################################
      # 8. SIGNATURE DES IMAGES — COSIGN
      ############################################
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Images (Cosign)
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
        run: |
          cosign sign --key env://COSIGN_KEY my-backend:latest
          cosign sign --key env://COSIGN_KEY my-frontend:latest

      ############################################
      # 9. DÉMARRAGE DES SERVICES POUR TESTS
      ############################################
      - name: Start Compose
        run: docker compose up -d

      - name: Wait backend
        run: |
          until curl -s http://localhost:8000/; do
            echo "Waiting backend..."
            sleep 2
          done

      - name: Health Check Backend
        run: curl -f http://localhost:8000/

      - name: Health Check Frontend
        run: curl -f http://localhost:3000/  # port React dev server

  ############################################################
  # JOB 2 — SCANS DE SECURITE COMPLÉMENTAIRES (Snyk + Trivy)
  ############################################################
  security-scan:
    needs: build
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images for scan
        run: docker compose build

      ############################################
      # 10. SNYK — SCA + Container + Code
      ############################################
      # Backend Python
      - name: Snyk Backend Scan (Python)
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test

      # Frontend Node/React
      - name: Snyk Frontend Scan (Node)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test

      # Container scan
      - name: Snyk Container Scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: my-backend:latest
          args: --severity-threshold=high

      ############################################
      # 11. TRIVY — Code scan
      ############################################
      - name: Trivy Code Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1


      ############################################
      # 12. TRIVY — Image scan
      ############################################
      - name: Trivy Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: my-backend:latest
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: my-frontend:latest
          severity: CRITICAL
          exit-code: 1

      ############################################
      # 13. NOTIFICATION
      ############################################
      - name: Notify CI Failure
        if: failure()
        run: echo "CI échouée – sécurité non conforme."