name: CI Pipeline
permissions:
  contents: read
  security-events: write
  packages: write

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  ############################################################
  # JOB 1 — BUILD ET SCANS INITIAUX (Secrets, IaC, Policy)
  ############################################################
  build:
    runs-on: ubuntu-24.04
    steps:

      ############################################
      # 1. CHECKOUT DU CODE
      ############################################
      - name: Checkout
        uses: actions/checkout@v4

      ############################################
      # 2. SECRET SCANNING — GITLEAKS
      ############################################
      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: false

      ############################################
      # 3. IaC SECURITY — CHECKOV
      ############################################
      - name: IaC Scan (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: "."
          soft_fail: false
          config_file: ".checkov.yaml"

      ############################################
      # 4. POLICY AS CODE — CONFTEST
      ############################################
      - name: Policy Validation (Conftest)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            instrumenta/conftest test \
            -p /project/policy/ \
            --namespace main \
            /project/backend/dockerfile \
            /project/frontend/Dockerfile

      ############################################
      # 5. SONARQUBE — SAST / CODE QUALITY
      ############################################
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      ############################################
      # 6. LOGIN GHCR + BUILD + PUSH
      ############################################
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/my-backend:latest" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/my-frontend:latest" >> $GITHUB_ENV

      - name: Build Docker images
        run: docker compose build

      - name: Push Docker images to GHCR
        run: |
          docker tag my-backend:latest ${{ env.BACKEND_IMAGE }}
          docker tag my-frontend:latest ${{ env.FRONTEND_IMAGE }}
          docker push ${{ env.BACKEND_IMAGE }}
          docker push ${{ env.FRONTEND_IMAGE }}

      ############################################
      # 7. SBOM (CycloneDX)
      ############################################
      - name: SBOM Backend
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.BACKEND_IMAGE }}
          format: cyclonedx-json
          output-file: sbom-backend.json

      - name: SBOM Frontend
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.FRONTEND_IMAGE }}
          format: cyclonedx-json
          output-file: sbom-frontend.json

      ############################################
      # 8. SIGNATURE DES IMAGES — COSIGN
      ############################################
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Images (Cosign)
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
        run: |
          cosign sign --yes --key env://COSIGN_KEY ${{ env.BACKEND_IMAGE }}
          cosign sign --yes --key env://COSIGN_KEY ${{ env.FRONTEND_IMAGE }}

      ############################################
      # 9. DÉMARRAGE DES SERVICES POUR TESTS
      ############################################
      - name: Start Compose
        run: docker compose up -d

      - name: Wait backend
        run: |
          until curl -s http://localhost:8000/; do
            echo "Waiting backend..."
            sleep 2
          done

      - name: Health Check Backend
        run: curl -f http://localhost:8000/

      - name: Health Check Frontend
        run: curl -f http://localhost:3000/

  ############################################################
  # JOB 2 — SCANS DE SECURITE COMPLÉMENTAIRES (Snyk + Trivy)
  ############################################################
  security-scan:
    needs: build
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/my-backend:latest" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/my-frontend:latest" >> $GITHUB_ENV

      - name: Build Docker images for scan
        run: docker compose build

      ############################################
      # 10. SNYK — SCA + Container + Code
      ############################################
      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Snyk Backend Scan (Python)
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=backend/requirements.txt
          
      - name: Snyk Frontend Scan (Node)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=frontend/package.json

      - name: Snyk Container Scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.BACKEND_IMAGE }}
          args: --file=backend/dockerfile --severity-threshold=high

      ############################################
      # 11. TRIVY — Code scan
      ############################################
      - name: Trivy Code Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

      ############################################
      # 12. TRIVY — Image scan
      ############################################
      - name: Trivy Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.BACKEND_IMAGE }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.FRONTEND_IMAGE }}
          severity: CRITICAL
          exit-code: 1

      ############################################
      # 13. NOTIFICATION
      ############################################
      - name: Notify CI Failure
        if: failure()
        run: echo "CI échouée – sécurité non conforme."