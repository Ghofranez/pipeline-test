name: CI Pipeline
permissions:
  contents: read
  security-events: write
  packages: write

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  ############################################################
  # JOB 1 — CHECKOUT + SECRET SCAN
  ############################################################
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Secret Scan
        uses: gitleaks/gitleaks-action@v2

  ############################################################
  # JOB 2 — IaC Scan
  ############################################################
  iac-scan:
    name: IaC Scan (Checkov)
    needs: secret-scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: IaC Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: "."
          soft_fail: false
          config_file: ".checkov.yaml"

  ############################################################
  # JOB 3 — Policy Validation
  ############################################################
  policy-scan:
    name: Policy Validation (Conftest)
    needs: iac-scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Conftest Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            instrumenta/conftest test \
            -p /project/policy/ \
            --namespace main \
            /project/backend/dockerfile \
            /project/frontend/Dockerfile

  ############################################################
  # JOB 4 — Backend Tests + Coverage
  ############################################################
  backend-tests:
    name: Backend Tests
    needs: policy-scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Python Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov
      - name: Run Backend Tests
        run: pytest backend/tests --cov=backend --cov-report=xml

  ############################################################
  # JOB 5 — Frontend Tests + Coverage
  ############################################################
  frontend-tests:
    name: Frontend Tests
    needs: backend-tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Frontend Dependencies
        run: npm install --prefix frontend
      - name: Run Frontend Tests
        run: npm test --prefix frontend -- --coverage --coverageReporters=lcov

  ############################################################
  # JOB 6 — SonarCloud Analysis
  ############################################################
  sonarcloud:
    name: SonarCloud Scan
    needs: frontend-tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=my-org_my-repo
            -Dsonar.organization=my-org
            -Dsonar.sources=backend,frontend
            -Dsonar.tests=backend/tests,frontend/tests
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  ############################################################
  # JOB 7 — Docker Build + Push
  ############################################################
  docker-build:
    name: Docker Build & Push
    needs: sonarcloud
    runs-on: ubuntu-24.04
    outputs:
      backend_image: ${{ steps.set_images.outputs.backend }}
      frontend_image: ${{ steps.set_images.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image names
        id: set_images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "::set-output name=backend::ghcr.io/${OWNER}/my-backend:latest"
          echo "::set-output name=frontend::ghcr.io/${OWNER}/my-frontend:latest"
      - name: Build Docker Images
        run: docker compose build --pull
      - name: Push Docker Images
        run: |
          docker push ${{ steps.set_images.outputs.backend }}
          docker push ${{ steps.set_images.outputs.frontend }}

  ############################################################
  # JOB 8 — SBOM + Cosign
  ############################################################
  sbom-cosign:
    name: SBOM + Cosign
    needs: docker-build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: SBOM Backend
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ needs.docker-build.outputs.backend_image }}
          format: cyclonedx-json
          output-file: sbom-backend.json
      - name: SBOM Frontend
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ needs.docker-build.outputs.frontend_image }}
          format: cyclonedx-json
          output-file: sbom-frontend.json
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign Docker Images
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
        run: |
          cosign sign --yes --key env://COSIGN_KEY ${{ needs.docker-build.outputs.backend_image }}
          cosign sign --yes --key env://COSIGN_KEY ${{ needs.docker-build.outputs.frontend_image }}

  ############################################################
  # JOB 9 — Security Scans (Snyk + Trivy)
  ############################################################
  security-scan:
    name: Security Scans
    needs: sbom-cosign
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Snyk Backend Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=backend/requirements.txt --skip-unresolved
      - name: Snyk Frontend Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=frontend/package.json
      - name: Snyk Container Scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ needs.docker-build.outputs.backend_image }}
          args: --file=backend/dockerfile --severity-threshold=high
      - name: Trivy Code Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Trivy Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ needs.docker-build.outputs.backend_image }}
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Trivy Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ needs.docker-build.outputs.frontend_image }}
          severity: CRITICAL
          exit-code: 1
      - name: Notify CI Failure
        if: failure()
        run: echo "CI échouée – sécurité non conforme."