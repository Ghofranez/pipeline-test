version: "3.9"

services:

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    image: my-backend:latest 
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_USER: app_user
      DB_PASSWORD: app_pass
      DB_NAME: app_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    image: my-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data: